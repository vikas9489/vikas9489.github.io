name: Notify subscribers on new blog post

on:
  push:
    branches: [main]
    paths:
      - 'blog/*.html'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send one labelled test notification instead of diffing for new posts'
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new posts and send OneSignal push
        env:
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: |
          set -e
          APP_ID="d5d2f97e-696a-4b8b-b5a6-801a1e0e18b0"

          if [ -z "$ONESIGNAL_REST_API_KEY" ]; then
            echo "::warning::ONESIGNAL_REST_API_KEY secret is not set — skipping notification."
            exit 0
          fi

          send_notification() {
            local title="$1"
            local body="$2"
            local url="$3"

            local PAYLOAD
            PAYLOAD=$(jq -n --arg appid "$APP_ID" --arg title "$title" --arg body "$body" --arg url "$url" \
              '{app_id: $appid, target_channel: "push", included_segments: ["Subscribed Users"], headings: {en: $title}, contents: {en: $body}, url: $url}')

            local RESPONSE HTTP_STATUS BODY_RESP RECIPIENTS
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.onesignal.com/notifications" \
              -H "Content-Type: application/json" \
              -H "Authorization: Key ${ONESIGNAL_REST_API_KEY}" \
              -d "$PAYLOAD")

            HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
            BODY_RESP=$(echo "$RESPONSE" | sed '$d')

            echo "OneSignal HTTP status: $HTTP_STATUS"
            echo "OneSignal response body: $BODY_RESP"

            if [ "$HTTP_STATUS" -ge 400 ]; then
              echo "::error::OneSignal API call failed (HTTP $HTTP_STATUS) for '$title': $BODY_RESP"
              return 1
            fi

            RECIPIENTS=$(echo "$BODY_RESP" | jq -r '.recipients // "unknown"')
            if [ "$RECIPIENTS" = "0" ]; then
              echo "::warning::OneSignal accepted '$title' but reports 0 recipients — nobody is currently subscribed (or the segment name doesn't match). Response: $BODY_RESP"
            else
              echo "Notification '$title' sent to $RECIPIENTS recipient(s)."
            fi
          }

          if [ "$TEST_MODE" = "true" ]; then
            echo "Sending labelled test notification..."
            send_notification \
              "[Test] bytevikas notify workflow" \
              "This is a one-off test of the auto-notify pipeline — not a real post." \
              "https://bytevikas.com/blog/index.html"
            exit 0
          fi

          NEW_FILES=$(git diff --name-status HEAD^ HEAD -- 'blog/*.html' | awk '$1=="A" {print $2}' | grep -v '/index\.html$' || true)

          if [ -z "$NEW_FILES" ]; then
            echo "No new blog posts in this push — skipping notification."
            exit 0
          fi

          for FILE in $NEW_FILES; do
            TITLE=$(grep -oP '(?<=<h1>).*?(?=</h1>)' "$FILE" | head -1 | sed -e 's/&amp;/\&/g' -e 's/&lt;/</g' -e 's/&gt;/>/g')
            EXCERPT=$(grep -oP '(?<=<meta name="description" content=").*?(?=")' "$FILE" | head -1)
            SLUG=$(basename "$FILE")
            URL="https://bytevikas.com/blog/${SLUG}"

            echo "Notifying for: $TITLE ($URL)"
            send_notification "$TITLE" "$EXCERPT" "$URL"
          done
